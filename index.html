<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM POSSE — ハッカソン作品 制作</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-white shadow-sm py-4 px-8 flex items-center justify-between">
    <span class="text-xl font-bold tracking-wide">TEAM POSSE</span>
    <!-- TODO: ナビゲーションを追加する -->
  </header>

  <main>

    <!-- ヒーローセクション -->
    <section class="text-center py-20 px-8 bg-gradient-to-br from-indigo-50 to-white">
      <h1 class="text-4xl font-bold mb-4">私たちのハッカソン作品</h1>
      <p class="text-gray-600 text-lg max-w-xl mx-auto">
        チームで力を合わせて48時間で作り上げた、課題解決のためのWebアプリケーションです。
      </p>
    </section>

    <!-- メンバー紹介セクション -->
    <section class="py-16 px-8 max-w-5xl mx-auto">
      <h2 class="text-2xl font-bold mb-8 text-center">メンバー紹介</h2>
      <!-- TODO: メンバーカードを追加する -->
    </section>

    <!-- 作品紹介セクション -->
    <section class="py-16 px-8 max-w-5xl mx-auto bg-white rounded-xl shadow-sm mb-16">
      <h2 class="text-2xl font-bold mb-8 text-center">作品紹介</h2>
      <!-- TODO: 作品の説明を追加する -->
    </section>

    <!-- コンフリクト実践用ボックス -->
    <section class="py-12 px-8 max-w-5xl mx-auto text-center">
      <h2 class="text-lg font-semibold mb-4 text-gray-500">実践②：コンフリクト体験エリア</h2>
      <p class="text-sm text-gray-400 mb-6">
        下のボックスの色が <code>style.css</code> の <code>.practice-box</code> で制御されています。
        実践②では Person A / B それぞれがこの色を変更してコンフリクトを体験します。
      </p>
      <div class="flex justify-center">
        <div class="practice-box">CONFLICT ZONE</div>
      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="text-center py-8 text-sm text-gray-400 border-t border-gray-200">
    &copy; 2025 TEAM POSSE. All rights reserved.
  </footer>

</body>
</html>
